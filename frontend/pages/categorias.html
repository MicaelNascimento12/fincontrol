<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorias | FinControl</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
</head>

<body>

    <div class="layout">

        <aside class="sidebar">

            <div class="logo">
                <h2>FinControl</h2>
            </div>

            <nav>
                <a href="dashboard.html">Dashboard</a>
                <a href="transacoes.html">Transações</a>
                <a href="categorias.html" class="active">Categorias</a>
                <a href="perfil.html">Perfil</a>
            </nav>

            <button id="btnLogout" class="btn-logout">Sair</button>

        </aside>

        <main class="content">

            <header class="header">
                <h1>Categorias</h1>
                <span id="usuarioNome">Carregando...</span>
            </header>

            <section class="panel">
                <h2 id="formTitulo">Nova Categoria</h2>

                <form id="categoriaForm" class="form-grid">

                    <input type="hidden" id="categoriaId">

                    <div class="form-group full">
                        <label for="nome">Nome da categoria</label>
                        <input type="text" id="nome" required placeholder="Ex: Música, Serviços, Salário">
                    </div>

                    <div class="form-actions full">
                        <button type="submit" class="btn-primary">
                            Salvar
                        </button>

                        <button type="button" class="btn-secondary" id="btnCancelarEdicao">
                            Cancelar edição
                        </button>
                    </div>

                    <div id="mensagem" class="message full"></div>

                </form>
            </section>

            <section class="panel">
                <div class="section-header">
                    <h2>Minhas Categorias</h2>
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Ações</th>
                            </tr>
                        </thead>

                        <tbody id="tabelaCategorias">
                            <tr>
                                <td colspan="2">Carregando...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

        </main>

    </div>

    <script src="../javascript/api.js"></script>
    <script src="../javascript/auth.js"></script>
    <script src="../javascript/categorias.js"></script>

</body>

</html>
