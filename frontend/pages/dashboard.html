<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | FinControl</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
</head>

<body>

    <div class="layout">

        <!-- Sidebar -->

        <aside class="sidebar">

            <div class="logo">
                <h2>FinControl</h2>
            </div>

            <nav>

                <a href="dashboard.html" class="active">
                    Dashboard
                </a>

                <a href="transacoes.html">
                    Transações
                </a>

                <a href="categorias.html">
                    Categorias
                </a>

                <a href="perfil.html">
                    Perfil
                </a>

                <a href="relatorios.html">
                    Relatórios
                </a>

            </nav>

            <button id="btnLogout" class="btn-logout">
                Sair
            </button>

        </aside>

        <!-- Conteúdo -->

        <main class="content">

            <header class="header">

                <h1>Dashboard Financeiro</h1>

                <span id="usuarioNome">
                    Carregando...
                </span>

            </header>

            <!-- Cards -->

            <section class="cards">

                <div class="card">
                    <h3>Saldo Atual</h3>
                    <p id="saldo">R$ 0,00</p>
                </div>

                <div class="card">
                    <h3>Receitas</h3>
                    <p id="receitas">R$ 0,00</p>
                </div>

                <div class="card">
                    <h3>Despesas</h3>
                    <p id="despesas">R$ 0,00</p>
                </div>

            </section>

            <!-- Próximos gráficos -->

            <section class="charts-grid">
                <div class="panel">
                    <h2>Gastos por Categoria</h2>
                    <p id="semDadosCategorias" class="empty-message">Nenhuma despesa paga cadastrada.</p>
                    <canvas id="graficoCategorias"></canvas>
                </div>

                <div class="panel">
                    <h2>Fluxo Mensal</h2>
                    <p id="semDadosFluxo" class="empty-message">Nenhuma transação paga cadastrada.</p>
                    <canvas id="graficoFluxoMensal"></canvas>
                </div>
            </section>

        </main>

    </div>

    <script src="../javascript/api.js"></script>
    <script src="../javascript/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../javascript/dashboard.js"></script>

</body>

</html>
