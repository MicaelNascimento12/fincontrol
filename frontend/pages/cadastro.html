<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | FinControl</title>
    <link rel="stylesheet" href="../css/global.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-left">
            <h1>FinControl</h1>
            <p>
                Crie sua conta e comece a organizar suas finanças com categorias automáticas, dashboard e controle de transações.
            </p>
        </section>

        <section class="auth-right">
            <div class="auth-card">
                <h2>Criar conta</h2>
                <p>Preencha os dados para começar.</p>

                <form id="cadastroForm">
                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" required placeholder="Seu nome">
                    </div>

                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" required placeholder="seuemail@exemplo.com">
                    </div>

                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" required minlength="6" placeholder="Mínimo 6 caracteres">
                    </div>

                    <button type="submit" class="btn-primary">Criar conta</button>

                    <div id="mensagem" class="message"></div>
                </form>

                <div class="auth-footer">
                    Já tem conta?
                    <a href="login.html">Entrar</a>
                </div>
            </div>
        </section>
    </main>

    <script src="../javascript/api.js"></script>
    <script src="../javascript/auth.js"></script>
    <script>
        redirecionarSeLogado();

        const form = document.getElementById("cadastroForm");
        const mensagem = document.getElementById("mensagem");

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const nome = document.getElementById("nome").value;
            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;

            mensagem.className = "message";
            mensagem.textContent = "";

            try {
                await cadastrar(nome, email, senha);
            } catch (error) {
                mensagem.className = "message error";
                mensagem.textContent = error.message;
            }
        });
    </script>
</body>
</html>
