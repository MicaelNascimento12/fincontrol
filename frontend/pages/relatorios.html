<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios | FinControl</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
</head>

<body data-page="relatorios" data-title="Relatórios">

    <div class="layout">

        <aside id="appSidebar" class="sidebar"></aside>

        <main class="content">

            <header id="appHeader" class="topbar"></header>

            <div class="content-inner">

                <section class="panel">

                    <div class="panel-heading">
                        <span class="section-icon">
                            <i data-lucide="filter"></i>
                        </span>

                        <h2>Filtros</h2>
                    </div>

                    <form id="filtrosForm" class="form-grid">

                        <div class="form-group">
                            <label for="filtroTipo">Tipo</label>
                            <select id="filtroTipo">
                                <option value="">Todos</option>
                                <option value="receita">Receitas</option>
                                <option value="despesa">Despesas</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="filtroCategoria">Categoria</label>
                            <select id="filtroCategoria">
                                <option value="">Todas</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="dataInicio">Data inicial</label>
                            <input type="date" id="dataInicio">
                        </div>

                        <div class="form-group">
                            <label for="dataFim">Data final</label>
                            <input type="date" id="dataFim">
                        </div>

                        <div class="form-actions full">
                            <button type="submit" class="btn-primary">
                                <i data-lucide="file-search"></i>
                                <span>Gerar relatório</span>
                            </button>

                            <button type="button" class="btn-secondary" id="btnLimparFiltros">
                                <i data-lucide="rotate-ccw"></i>
                                <span>Limpar filtros</span>
                            </button>
                        </div>

                        <div id="mensagem" class="message full"></div>

                    </form>

                </section>

                <section class="cards">

                    <div class="card">
                        <div class="card-heading">
                            <span class="card-icon card-icon-income">
                                <i data-lucide="trending-up"></i>
                            </span>

                            <h3>Receitas no período</h3>
                        </div>

                        <p id="totalReceitas">R$ 0,00</p>
                    </div>

                    <div class="card">
                        <div class="card-heading">
                            <span class="card-icon card-icon-expense">
                                <i data-lucide="trending-down"></i>
                            </span>

                            <h3>Despesas no período</h3>
                        </div>

                        <p id="totalDespesas">R$ 0,00</p>
                    </div>

                    <div class="card">
                        <div class="card-heading">
                            <span class="card-icon card-icon-balance">
                                <i data-lucide="wallet"></i>
                            </span>

                            <h3>Saldo do período</h3>
                        </div>

                        <p id="saldoPeriodo">R$ 0,00</p>
                    </div>

                </section>

                <section class="panel">

                    <div class="panel-heading panel-heading-between">

                        <div class="panel-heading-main">
                            <span class="section-icon">
                                <i data-lucide="table"></i>
                            </span>

                            <h2>Transações encontradas</h2>
                        </div>

                        <span id="quantidadeRegistros">0 registros</span>

                    </div>

                    <div class="table-wrapper">

                        <table>
                            <thead>
                                <tr>
                                    <th>Data</th>
                                    <th>Descrição</th>
                                    <th>Categoria</th>
                                    <th>Tipo</th>
                                    <th>Status</th>
                                    <th>Valor</th>
                                </tr>
                            </thead>

                            <tbody id="tabelaRelatorio">
                                <tr>
                                    <td colspan="6">Carregando...</td>
                                </tr>
                            </tbody>
                        </table>

                    </div>

                </section>

            </div>

        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/lucide@1.21.0/dist/umd/lucide.min.js"></script>

    <script src="../javascript/api.js"></script>
    <script src="../javascript/auth.js"></script>
    <script src="../javascript/ui.js"></script>
    <script src="../javascript/relatorios.js"></script>

</body>

</html>
