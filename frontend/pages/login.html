<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FinControl</title>
    <link rel="stylesheet" href="../css/global.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-left">
            <div class="auth-brand">

                <div class="brand-mark">
                    <i data-lucide="chart-no-axes-column-increasing"></i>
                </div>

                <h1>FinControl</h1>

            </div>
            <p>
                Controle suas receitas, despesas, categorias e acompanhe sua vida financeira em um painel simples e moderno.
            </p>
        </section>

        <section class="auth-right">
            <div class="auth-card">
                <h2>Entrar</h2>
                <p>Acesse sua conta para continuar.</p>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" required placeholder="seuemail@exemplo.com">
                    </div>

                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" required placeholder="Digite sua senha">
                    </div>

                    <button type="submit" class="btn-primary">Entrar</button>

                    <div id="mensagem" class="message"></div>
                </form>

                <div class="auth-footer">
                    Ainda não tem conta?
                    <a href="cadastro.html">Criar conta</a>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/lucide@1.21.0/dist/umd/lucide.min.js"></script>
    <script src="../javascript/api.js"></script>
    <script src="../javascript/auth.js"></script>
    <script>
        redirecionarSeLogado();

        const form = document.getElementById("loginForm");
        const mensagem = document.getElementById("mensagem");

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;

            mensagem.className = "message";
            mensagem.textContent = "";

            try {
                await login(email, senha);
            } catch (error) {
                mensagem.className = "message error";
                mensagem.textContent = error.message;
            }
        });
    </script>
</body>
</html>
