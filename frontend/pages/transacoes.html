<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transações | FinControl</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
</head>

<body data-page="transacoes" data-title="Transações">

    <div class="layout">

        <aside id="appSidebar" class="sidebar"></aside>

        <main class="content">

            <header id="appHeader" class="topbar"></header>

        <main class="content">

            <header class="header">
                <h1>Transações</h1>
                <span id="usuarioNome">Carregando...</span>
            </header>

            <section class="panel">
                <div class="panel-heading">
            <span class="section-icon">
                <i data-lucide="receipt-text"></i>
            </span>

            <h2 id="formTitulo">Nova Transação</h2>
        </div>

                <form id="transacaoForm" class="form-grid">

                    <input type="hidden" id="transacaoId">

                    <div class="form-group">
                        <label for="descricao">Descrição</label>
                        <input type="text" id="descricao" placeholder="Ex: Mercado">
                    </div>

                    <div class="form-group">
                        <label for="valor">Valor</label>
                        <input type="number" id="valor" step="0.01" min="0.01" required>
                    </div>

                    <div class="form-group">
                        <label for="data">Data</label>
                        <input type="date" id="data" required>
                    </div>

                    <div class="form-group">
                        <label for="tipo">Tipo</label>
                        <select id="tipo" required>
                            <option value="receita">Receita</option>
                            <option value="despesa">Despesa</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status" required>
                            <option value="pago">Pago</option>
                            <option value="pendente">Pendente</option>
                            <option value="cancelado">Cancelado</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="categoria">Categoria</label>
                        <select id="categoria" required></select>
                    </div>

                    <div class="form-group full">
                        <label for="observacao">Observação</label>
                        <input type="text" id="observacao" placeholder="Opcional">
                    </div>

                    <div class="form-actions full">
                        <button type="submit" class="btn-primary" id="btnSalvar">
                            <i data-lucide="save"></i>
                            <span>Salvar</span>
                        </button>

                        <button
                            type="button"
                            class="btn-secondary"
                            id="btnCancelarEdicao"
                            style="display: none;"
                        >
                            <i data-lucide="x"></i>
                            <span>Cancelar edição</span>
                        </button>
                    </div>

                    <div id="mensagem" class="message full"></div>

                </form>
            </section>

            <section class="panel">
                <div class="panel-heading panel-heading-between">

                    <div class="panel-heading-main">
                        <span class="section-icon">
                            <i data-lucide="list"></i>
                        </span>

                        <h2>Minhas Transações</h2>
                    </div>

                    <div class="filters">
                        <select id="filtroTipo">
                            <option value="">Todos os tipos</option>
                            <option value="receita">Receitas</option>
                            <option value="despesa">Despesas</option>
                        </select>

                        <select id="filtroCategoria">
                            <option value="">Todas as categorias</option>
                        </select>
                    </div>

                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Descrição</th>
                                <th>Categoria</th>
                                <th>Tipo</th>
                                <th>Status</th>
                                <th>Valor</th>
                                <th>Ações</th>
                            </tr>
                        </thead>

                        <tbody id="tabelaTransacoes">
                            <tr>
                                <td colspan="7">Carregando...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/lucide@1.21.0/dist/umd/lucide.min.js"></script>

    <script src="../javascript/api.js"></script>
    <script src="../javascript/auth.js"></script>
    <script src="../javascript/ui.js"></script>
    <script src="../javascript/transacoes.js"></script>

    <div class="modal-overlay" id="modalExcluirTransacao">

        <div class="modal">

            <div class="modal-header">

                <div class="modal-icon">
                    <i data-lucide="trash-2"></i>
                </div>

                <div class="modal-copy">
                    <h3>Excluir transação</h3>

                    <p>
                        Tem certeza que deseja excluir esta transação?
                        <br>
                        <span class="warning-text">
                            Esta ação não pode ser desfeita.
                        </span>
                    </p>
                </div>

            </div>

            <div class="modal-actions">

                <button
                    type="button"
                    class="btn-secondary"
                    id="btnFecharModalTransacao"
                >
                    Cancelar
                </button>

                <button
                    type="button"
                    class="btn-danger"
                    id="btnConfirmarExcluirTransacao"
                >
                    <i data-lucide="trash-2"></i>
                    Sim, excluir
                </button>

            </div>

        </div>

    </div>
</div>

</body>

</html>
