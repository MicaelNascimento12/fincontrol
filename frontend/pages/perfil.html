<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | FinControl</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
</head>

<body data-page="perfil" data-title="Perfil">

    <div class="layout">

        <aside id="appSidebar" class="sidebar"></aside>

        <main class="content">

            <header id="appHeader" class="topbar"></header>

            <div class="content-inner">

                <section class="panel">

                    <div class="panel-heading">
                        <span class="section-icon">
                            <i data-lucide="user-round"></i>
                        </span>

                        <h2>Dados da conta</h2>
                    </div>

                    <form id="perfilForm" class="form-grid">

                        <div class="form-group">
                            <label for="nome">Nome</label>
                            <input type="text" id="nome" required>
                        </div>

                        <div class="form-group">
                            <label for="email">E-mail</label>
                            <input type="email" id="email" required>
                        </div>

                        <div class="form-group">
                            <label for="dataCriacao">Data de criação</label>
                            <input type="text" id="dataCriacao" disabled>
                        </div>

                        <div class="form-actions full">
                            <button type="button" class="btn-secondary" id="btnEditarPerfil">
                                <i data-lucide="pencil"></i>
                                <span>Editar informações</span>
                            </button>

                            <button type="submit" class="btn-primary" id="btnSalvarPerfil" style="display: none;">
                                <i data-lucide="save"></i>
                                <span>Salvar alterações</span>
                            </button>

                            <button type="button" class="btn-secondary" id="btnCancelarPerfil" style="display: none;">
                                <i data-lucide="x"></i>
                                <span>Cancelar</span>
                            </button>
                        </div>

                        <div id="mensagemPerfil" class="message full"></div>

                    </form>

                </section>

                <section class="panel">

                    <div class="panel-heading">
                        <span class="section-icon">
                            <i data-lucide="lock-keyhole"></i>
                        </span>

                        <h2>Alterar senha</h2>
                    </div>

                    <form id="senhaForm" class="form-grid">

                        <div class="form-group">
                            <label for="senhaAtual">Senha atual</label>
                            <input type="password" id="senhaAtual" required minlength="6">
                        </div>

                        <div class="form-group">
                            <label for="novaSenha">Nova senha</label>
                            <input type="password" id="novaSenha" required minlength="6">
                        </div>

                        <div class="form-group">
                            <label for="confirmarSenha">Confirmar nova senha</label>
                            <input type="password" id="confirmarSenha" required minlength="6">
                        </div>

                        <div class="form-actions full">
                            <button type="button" class="btn-secondary" id="btnMostrarSenha">
                                <i data-lucide="key-round"></i>
                                <span>Alterar senha</span>
                            </button>

                            <button type="submit" class="btn-primary" id="btnSalvarSenha" style="display: none;">
                                <i data-lucide="save"></i>
                                <span>Salvar nova senha</span>
                            </button>

                            <button type="button" class="btn-secondary" id="btnCancelarSenha" style="display: none;">
                                <i data-lucide="x"></i>
                                <span>Cancelar</span>
                            </button>
                        </div>

                        <div id="mensagemSenha" class="message full"></div>

                    </form>

                </section>

            </div>

        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/lucide@1.21.0/dist/umd/lucide.min.js"></script>

    <script src="../javascript/api.js"></script>
    <script src="../javascript/auth.js"></script>
    <script src="../javascript/ui.js"></script>
    <script src="../javascript/perfil.js"></script>

</body>

</html>
